# Produktions-Setup. Image kommt aus GHCR (CI baut bei jedem Release-Tag);
# alternativ lokal bauen: docker compose build
services:
  web:
    image: ghcr.io/brightcolor/abholtag.de-claude:latest
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind Mounts: Original-PDFs und Uploads sichtbar neben dem Compose-File
      - ./docker-data/media:/app/media
    ports:
      - "127.0.0.1:8000:8000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abfuhrkalender}
      POSTGRES_USER: ${POSTGRES_USER:-abfuhrkalender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD fehlt}
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Periodische Aufgaben ohne Celery: schlichter Scheduler-Container (alle 6 h)
  cron:
    image: ghcr.io/brightcolor/abholtag.de-claude:latest
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docker-data/media:/app/media
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          python manage.py fetch_waste_source --import || true
          python manage.py aggregate_analytics || true
          python manage.py purge_old_analytics || true
          python manage.py evaluate_quorums || true
          sleep 21600
        done
